<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スロットデータ</title>
  <style>
    /* ── ベース ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }
    a { color: #7cb9ff; }

    /* ── パスワード画面 ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }
    #auth-screen h1 { font-size: 1.2rem; color: #aaa; }
    #auth-screen input {
      padding: .6rem 1rem;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1c1f2e;
      color: #fff;
      font-size: 1rem;
      width: 260px;
      text-align: center;
      letter-spacing: .1em;
    }
    #auth-screen input:focus { outline: none; border-color: #7cb9ff; }
    #auth-screen button {
      padding: .6rem 2rem;
      border-radius: 6px;
      border: none;
      background: #7cb9ff;
      color: #0f1117;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }
    #auth-screen button:hover { background: #a8d0ff; }
    #auth-error { color: #e05555; font-size: .85rem; min-height: 1.2em; }

    /* ── レイアウト ── */
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: .25rem; }
    .subtitle { font-size: .85rem; color: #888; margin-bottom: 1rem; }

    /* ── 日付セレクター ── */
    .date-bar {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .date-bar label { font-size: .85rem; color: #aaa; }
    .date-bar select {
      padding: .4rem .75rem;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1c1f2e;
      color: #fff;
      font-size: .9rem;
      cursor: pointer;
    }
    .date-bar select:focus { outline: none; border-color: #7cb9ff; }
    .date-bar .nav-btn {
      padding: .35rem .7rem;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1c1f2e;
      color: #aaa;
      font-size: .85rem;
      cursor: pointer;
    }
    .date-bar .nav-btn:hover:not(:disabled) { border-color: #7cb9ff; color: #7cb9ff; }
    .date-bar .nav-btn:disabled { opacity: .35; cursor: default; }

    /* ── セクション ── */
    section { margin-bottom: 2rem; }
    h2 {
      font-size: 1rem; font-weight: 700;
      border-left: 3px solid #7cb9ff;
      padding-left: .5rem;
      margin-bottom: .75rem;
      color: #c5d8ff;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* ── カード ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: .75rem;
    }
    .card {
      background: #1c1f2e;
      border-radius: 8px;
      padding: .85rem 1rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color .15s, background .15s;
    }
    .card:hover { border-color: #7cb9ff; background: #1f2438; }
    .card.active { border-color: #7cb9ff; background: #1a2540; }
    .card-title { font-size: .85rem; color: #aaa; margin-bottom: .35rem; }
    .card-value { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .card-sub { font-size: .75rem; color: #666; margin-top: .2rem; }

    /* ── 店舗ドリルダウン ── */
    #store-detail {
      background: #14172a;
      border: 1px solid #2a3050;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    #store-detail-title {
      font-size: 1rem;
      font-weight: 700;
      color: #c5d8ff;
      margin-bottom: .75rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .close-btn {
      margin-left: auto;
      padding: .2rem .6rem;
      border-radius: 4px;
      border: 1px solid #444;
      background: transparent;
      color: #aaa;
      font-size: .8rem;
      cursor: pointer;
    }
    .close-btn:hover { border-color: #7cb9ff; color: #7cb9ff; }

    /* ── テーブル ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th {
      text-align: left; padding: .5rem .75rem;
      background: #1c1f2e; color: #aaa;
      border-bottom: 1px solid #2a2d3e;
      white-space: nowrap;
    }
    td {
      padding: .45rem .75rem;
      border-bottom: 1px solid #1c1f2e;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c1f2e; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .pos { color: #4caf81; }
    .neg { color: #e05555; }

    /* ── バッジ ── */
    .badge {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 4px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-ok  { background: #1b3a2a; color: #4caf81; }
    .badge-ng  { background: #3a1b1b; color: #e05555; }

    /* ── 空状態 ── */
    .empty { color: #555; font-size: .85rem; padding: 1rem 0; }

    /* ── フッター ── */
    footer { margin-top: 3rem; text-align: center; font-size: .75rem; color: #444; }

    /* ── 全台リストモーダル ── */
    #machine-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #machine-modal-overlay.open { display: flex; }
    #machine-modal {
      background: #14172a;
      border: 1px solid #2a3050;
      border-radius: 10px;
      width: 100%;
      max-width: 860px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #machine-modal-header {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .85rem 1.25rem;
      border-bottom: 1px solid #2a3050;
      font-size: 1rem;
      font-weight: 700;
      color: #c5d8ff;
      flex-shrink: 0;
    }
    #machine-modal-body {
      overflow-y: auto;
      padding: .75rem 1.25rem 1.25rem;
      flex: 1;
    }
    /* ソート可能なヘッダー */
    th.sortable {
      cursor: pointer;
      user-select: none;
    }
    th.sortable:hover { color: #7cb9ff; }
    th.sortable::after { content: " ↕"; font-size: .7rem; color: #555; }
    th.sort-asc::after  { content: " ▲"; color: #7cb9ff; }
    th.sort-desc::after { content: " ▼"; color: #7cb9ff; }
    /* クリック可能な日次サマリ行 */
    #store-detail-body tr { cursor: pointer; }
    #store-detail-body tr:hover td { background: #1f2438; }
    /* モーダルタブ */
    #machine-modal-tabs {
      display: flex;
      gap: .5rem;
      padding: .5rem 1.25rem 0;
      border-bottom: 1px solid #2a3050;
      flex-shrink: 0;
    }
    .modal-tab {
      padding: .4rem 1rem;
      border-radius: 6px 6px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      background: transparent;
      color: #888;
      font-size: .85rem;
      cursor: pointer;
    }
    .modal-tab:hover { color: #c5d8ff; }
    .modal-tab.active {
      background: #1c1f2e;
      border-color: #2a3050;
      color: #7cb9ff;
      font-weight: 700;
    }
    /* 機種別サマリのクリック可能行 */
    #model-table-body tr { cursor: pointer; }
    #model-table-body tr:hover td { background: #1c1f2e; }
  </style>
</head>
<body>

<!-- ── パスワード認証画面 ── -->
<div id="auth-screen">
  <h1>🔒 パスワードを入力してください</h1>
  <input type="password" id="pw-input" placeholder="password" autocomplete="current-password" />
  <button onclick="checkPassword()">ログイン</button>
  <p id="auth-error"></p>
</div>

<!-- ── メインコンテンツ（認証後に表示） ── -->
<div class="container" id="main-content" style="display:none;">

  <h1>🎰 スロットデータ</h1>
  <p class="subtitle" id="generated-at">読み込み中…</p>

  <!-- 日付セレクター -->
  <div class="date-bar">
    <label for="date-select">📅 表示日:</label>
    <button class="nav-btn" id="btn-prev" onclick="stepDate(-1)" disabled>◀ 前日</button>
    <select id="date-select" onchange="onDateChange()">
      <option value="">読み込み中…</option>
    </select>
    <button class="nav-btn" id="btn-next" onclick="stepDate(+1)" disabled>翌日 ▶</button>
  </div>

  <!-- 店舗一覧 -->
  <section>
    <h2>店舗状況 <span style="font-size:.8rem;font-weight:400;color:#888;">（クリックで日次サマリ表示）</span></h2>
    <div class="cards" id="stores-container">
      <p class="empty">データを読み込み中…</p>
    </div>
  </section>

  <!-- 店舗別ドリルダウン（選択時のみ表示） -->
  <div id="store-detail" style="display:none;">
    <div id="store-detail-title">
      <span id="store-detail-name"></span>
      <button class="close-btn" onclick="closeStoreDetail()">✕ 閉じる</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日付</th>
            <th>ソース</th>
            <th class="num">台数</th>
            <th class="num">差枚合計</th>
          </tr>
        </thead>
        <tbody id="store-detail-body">
        </tbody>
      </table>
    </div>
  </div>

  <!-- 出ている機種ランキング -->
  <section>
    <h2 id="top-machines-heading">出ている機種（直近14日）</h2>
    <div class="table-wrap">
      <table id="top-machines-table">
        <thead>
          <tr>
            <th>#</th>
            <th>店舗</th>
            <th>機種名</th>
            <th class="num">平均差枚</th>
            <th class="num">勝率</th>
            <th class="num">最大差枚</th>
            <th class="num">日数</th>
          </tr>
        </thead>
        <tbody id="top-machines-body">
          <tr><td colspan="7" class="empty">データを読み込み中…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- 日次サマリ -->
  <section>
    <h2>日次収集サマリ（直近30日）</h2>
    <div class="table-wrap">
      <table id="daily-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>店舗</th>
            <th class="num">台数</th>
            <th class="num">差枚合計</th>
          </tr>
        </thead>
        <tbody id="daily-body">
          <tr><td colspan="4" class="empty">データを読み込み中…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <footer>
    個人利用目的のデータ記録サイトです。
    <a href="https://github.com/soana-0702/slot-data-collector" target="_blank">GitHub</a>
  </footer>

</div>

<!-- ── 全台リストモーダル ── -->
<div id="machine-modal-overlay" onclick="onModalOverlayClick(event)">
  <div id="machine-modal">
    <div id="machine-modal-header">
      <span id="machine-modal-title">全台リスト</span>
      <button id="show-all-btn" class="close-btn" style="display:none;margin-left:0;font-size:.78rem;" onclick="resetMachineFilter()">全台リストを表示</button>
      <button class="close-btn" onclick="closeMachineModal()">✕ 閉じる</button>
    </div>
    <!-- タブ -->
    <div id="machine-modal-tabs">
      <button class="modal-tab active" id="tab-btn-all" data-tab="all" onclick="switchModalTab('all')">全台リスト</button>
      <button class="modal-tab" data-tab="model" onclick="switchModalTab('model')">機種別サマリ</button>
    </div>
    <div id="machine-modal-body">
      <!-- 全台リストタブ -->
      <div id="tab-all">
        <div class="table-wrap">
          <table id="machine-table">
            <thead>
              <tr>
                <th class="sortable" data-col="machine_number">台番</th>
                <th class="sortable" data-col="machine_name">機種名</th>
                <th class="num sortable" data-col="diff_coins">差枚</th>
                <th class="num sortable" data-col="total_games">G数</th>
                <th class="num sortable" data-col="bb_prob">BB確率</th>
                <th class="num sortable" data-col="rb_prob">RB確率</th>
                <th>ソース</th>
              </tr>
            </thead>
            <tbody id="machine-table-body"></tbody>
          </table>
        </div>
      </div>
      <!-- 機種別サマリタブ -->
      <div id="tab-model" style="display:none;">
        <div class="table-wrap">
          <table id="model-table">
            <thead>
              <tr>
                <th class="sortable" data-col="machine_name">機種名</th>
                <th class="num sortable" data-col="total_diff">差枚合計</th>
                <th class="num sortable" data-col="avg_diff">平均差枚</th>
                <th class="num sortable" data-col="win_rate">勝率</th>
                <th class="num sortable" data-col="count">台数</th>
              </tr>
            </thead>
            <tbody id="model-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── パスワード認証 ────────────────────────────────────────────────────────
const PW_HASH = "e12fd2d9aea614423c629f54503faba614d968dc4057ce10c071093cc04f46fe";
const SESSION_KEY = "shd_auth";

async function sha256(text) {
  const buf = await crypto.subtle.digest(
    "SHA-256",
    new TextEncoder().encode(text)
  );
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

async function checkPassword() {
  const input = document.getElementById("pw-input").value;
  const hash = await sha256(input);
  if (hash === PW_HASH) {
    sessionStorage.setItem(SESSION_KEY, "1");
    showMain();
  } else {
    document.getElementById("auth-error").textContent = "パスワードが違います";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

function showMain() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("main-content").style.display = "block";
  init();
}

// Enter キーでログイン・セッション維持
document.addEventListener("DOMContentLoaded", () => {
  if (sessionStorage.getItem(SESSION_KEY) === "1") {
    showMain();
    return;
  }
  document.getElementById("pw-input").addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
  });
  document.getElementById("pw-input").focus();
});

// ── 数値フォーマット ──────────────────────────────────────────────────────
function fmtDiff(v) {
  if (v === null || v === undefined) return "—";
  const s = v >= 0 ? "+" : "";
  return s + v.toLocaleString();
}
function diffClass(v) {
  if (v === null || v === undefined) return "";
  return v >= 0 ? "pos" : "neg";
}
function fmtPct(v) {
  return (v * 100).toFixed(1) + "%";
}

// ── 日付一覧の管理 ───────────────────────────────────────────────────────
let availableDates = [];

async function loadIndex() {
  try {
    const res = await fetch("data/index.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const idx = await res.json();
    availableDates = idx.dates || [];
  } catch (e) {
    availableDates = [];
  }
}

function populateDateSelect(selectedDate) {
  const sel = document.getElementById("date-select");
  if (!availableDates.length) {
    sel.innerHTML = '<option value="">最新</option>';
    return;
  }
  sel.innerHTML = availableDates.map(d =>
    `<option value="${d}"${d === selectedDate ? " selected" : ""}>${d}</option>`
  ).join("");
  updateNavButtons();
}

function updateNavButtons() {
  const sel = document.getElementById("date-select");
  const idx = availableDates.indexOf(sel.value);
  document.getElementById("btn-prev").disabled = (idx === availableDates.length - 1);
  document.getElementById("btn-next").disabled = (idx <= 0);
}

function stepDate(direction) {
  const sel = document.getElementById("date-select");
  const idx = availableDates.indexOf(sel.value);
  const nextIdx = idx - direction;
  if (nextIdx < 0 || nextIdx >= availableDates.length) return;
  sel.value = availableDates[nextIdx];
  onDateChange();
}

async function onDateChange() {
  updateNavButtons();
  closeStoreDetail();
  const date = document.getElementById("date-select").value;
  await loadAndRender(date);
}

// ── データ読み込みと描画 ──────────────────────────────────────────────────
// 現在のデータを保持（ドリルダウンで参照）
let currentData = null;

async function init() {
  await loadIndex();
  const defaultDate = availableDates.length ? availableDates[0] : "";
  populateDateSelect(defaultDate);
  await loadAndRender(defaultDate);
}

async function loadAndRender(selectedDate) {
  const url = selectedDate ? `data/${selectedDate}.json` : "data/latest.json";
  let data;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (e) {
    document.getElementById("generated-at").textContent =
      "データの読み込みに失敗しました（" + e.message + "）";
    return;
  }
  currentData = data;
  render(data);
}

// ── 描画 ─────────────────────────────────────────────────────────────────
function render(data) {
  const ts = data.generated_at ? data.generated_at.replace("T", " ") : "不明";
  const playDate = data.play_date || "";
  document.getElementById("generated-at").textContent =
    (playDate ? `対象日: ${playDate}　` : "") + `生成: ${ts}`;

  if (playDate) {
    document.getElementById("top-machines-heading").textContent =
      `出ている機種（${playDate} 基準 直近14日）`;
  }

  renderStores(data.stores || []);
  renderTopMachines(data.top_machines || []);
  renderDaily(data.daily_summary || []);
}

// ── 店舗カード ────────────────────────────────────────────────────────────
function renderStores(stores) {
  const container = document.getElementById("stores-container");
  if (!stores.length) {
    container.innerHTML = '<p class="empty">データなし</p>';
    return;
  }
  container.innerHTML = stores.map(s => {
    const hasData = s.machine_count > 0;
    const badge = hasData
      ? `<span class="badge badge-ok">収集済</span>`
      : `<span class="badge badge-ng">未収集</span>`;
    // store_group キーで識別（store_id は JSON に存在しない）
    return `
      <div class="card" onclick="openStoreDetail('${s.store_group}')" data-group="${s.store_group}">
        <div class="card-title">${s.store_name}</div>
        <div class="card-value">${s.machine_count.toLocaleString()} 台</div>
        <div class="card-sub">${s.latest_date || "—"} ${badge}</div>
      </div>`;
  }).join("");
}

// ── 店舗ドリルダウン ──────────────────────────────────────────────────────
function openStoreDetail(storeGroup) {
  if (!currentData) return;

  // アクティブカードを切り替える
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
  const activeCard = document.querySelector(`.card[data-group="${storeGroup}"]`);
  if (activeCard) activeCard.classList.add("active");

  // 対象店舗情報
  const store = (currentData.stores || []).find(s => s.store_group === storeGroup);
  const storeName = store ? store.store_name : storeGroup;
  const storeIds = store ? store.store_ids : [storeGroup];

  document.getElementById("store-detail-name").textContent = `📊 ${storeName} — 日次サマリ`;

  // daily_summary から対象 store_id のデータを抽出・日付降順
  const summary = (currentData.daily_summary || [])
    .filter(d => storeIds.includes(d.store_id))
    .sort((a, b) => b.play_date.localeCompare(a.play_date));

  const tbody = document.getElementById("store-detail-body");
  if (!summary.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">データなし（過去30日分）</td></tr>';
  } else {
    tbody.innerHTML = summary.map(d => `
      <tr onclick="openMachineModal('${storeGroup}', '${storeName}', '${d.play_date}')" title="クリックで全台リストを表示">
        <td>${d.play_date}</td>
        <td><span style="font-size:.8rem;color:#888;">${d.store_id}</span></td>
        <td class="num">${d.machine_count.toLocaleString()}</td>
        <td class="num ${diffClass(d.total_diff)}">${fmtDiff(d.total_diff)}</td>
      </tr>`).join("");
  }

  document.getElementById("store-detail").style.display = "block";
  document.getElementById("store-detail").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function closeStoreDetail() {
  document.getElementById("store-detail").style.display = "none";
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
}

// ── 機種ランキング ────────────────────────────────────────────────────────
function renderTopMachines(machines) {
  const tbody = document.getElementById("top-machines-body");
  if (!machines.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">データが蓄積されると表示されます（14日分必要）</td></tr>';
    return;
  }

  // store_id → store_name を currentData.stores から引く
  const storeMap = {};
  if (currentData && currentData.stores) {
    currentData.stores.forEach(s => {
      s.store_ids.forEach(sid => { storeMap[sid] = s.store_name; });
    });
  }

  tbody.innerHTML = machines.map((m, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${storeMap[m.store_id] || m.store_id}</td>
      <td>${m.machine_name}</td>
      <td class="num ${diffClass(m.mean_diff)}">${fmtDiff(Math.round(m.mean_diff))}</td>
      <td class="num">${fmtPct(m.win_rate)}</td>
      <td class="num ${diffClass(m.max_diff)}">${fmtDiff(m.max_diff)}</td>
      <td class="num">${m.sample_days}</td>
    </tr>`).join("");
}

// ── 全台リストモーダル ────────────────────────────────────────────────────
// 現在モーダルに表示中の台データ（ソート用に保持）
let currentMachines = [];
let modalSortCol = "diff_coins";
let modalSortAsc = false;  // デフォルト：差枚降順

async function openMachineModal(storeGroup, storeName, playDate) {
  document.getElementById("machine-modal-title").textContent =
    `📋 ${storeName} — ${playDate} 全台リスト`;
  document.getElementById("machine-table-body").innerHTML =
    '<tr><td colspan="7" class="empty">読み込み中…</td></tr>';
  document.getElementById("machine-modal-overlay").classList.add("open");

  // machines/YYYY-MM-DD.json を fetch
  let machinesData;
  try {
    const res = await fetch(`data/machines/${playDate}.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    machinesData = await res.json();
  } catch (e) {
    document.getElementById("machine-table-body").innerHTML =
      `<tr><td colspan="7" class="empty">データ取得失敗: ${e.message}</td></tr>`;
    return;
  }

  // storeGroup に対応する machines を取得
  const storeEntry = machinesData.stores ? machinesData.stores[storeGroup] : null;
  currentMachines = storeEntry ? (storeEntry.machines || []) : [];

  // デフォルト：全台リストタブ・差枚降順・フィルタなし
  machineFilter = null;
  document.getElementById("tab-btn-all").textContent = "全台リスト";
  document.getElementById("show-all-btn").style.display = "none";
  switchModalTab("all");
  modalSortCol = "diff_coins";
  modalSortAsc = false;
  renderMachineTable();
  initMachineTableSort();
  initModelTableSort();
}

function closeMachineModal() {
  document.getElementById("machine-modal-overlay").classList.remove("open");
  currentMachines = [];
  machineFilter = null;
  document.getElementById("tab-btn-all").textContent = "全台リスト";
  document.getElementById("show-all-btn").style.display = "none";
}

function onModalOverlayClick(e) {
  // オーバーレイ背景クリック時のみ閉じる（モーダル内クリックは閉じない）
  if (e.target === document.getElementById("machine-modal-overlay")) {
    closeMachineModal();
  }
}

function renderMachineTable() {
  const tbody = document.getElementById("machine-table-body");

  // 機種名フィルタが有効なら絞り込む
  const source = machineFilter
    ? currentMachines.filter(m => m.machine_name === machineFilter)
    : currentMachines;

  if (!source.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">この日のデータなし</td></tr>';
    return;
  }

  // ソート処理
  const sorted = [...source].sort((a, b) => {
    let va = a[modalSortCol];
    let vb = b[modalSortCol];

    // 台番は数値ソート
    if (modalSortCol === "machine_number") {
      va = parseInt(va, 10) || 0;
      vb = parseInt(vb, 10) || 0;
    }
    // null は末尾
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;

    if (va < vb) return modalSortAsc ? -1 : 1;
    if (va > vb) return modalSortAsc ? 1 : -1;
    return 0;
  });

  tbody.innerHTML = sorted.map(m => {
    const bbStr = m.bb_prob != null ? `1/${m.bb_prob.toFixed(1)}` : "—";
    const rbStr = m.rb_prob != null ? `1/${m.rb_prob.toFixed(1)}` : "—";
    return `
      <tr>
        <td>${m.machine_number ?? "—"}</td>
        <td>${m.machine_name ?? "—"}</td>
        <td class="num ${diffClass(m.diff_coins)}">${fmtDiff(m.diff_coins)}</td>
        <td class="num">${m.total_games != null ? m.total_games.toLocaleString() : "—"}</td>
        <td class="num">${bbStr}</td>
        <td class="num">${rbStr}</td>
        <td style="font-size:.8rem;color:#888;">${m.source_id ?? "—"}</td>
      </tr>`;
  }).join("");

  // ソートインジケーターを更新
  document.querySelectorAll("#machine-table th.sortable").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.col === modalSortCol) {
      th.classList.add(modalSortAsc ? "sort-asc" : "sort-desc");
    }
  });
}

function initMachineTableSort() {
  document.querySelectorAll("#machine-table th.sortable").forEach(th => {
    // イベントリスナーの二重登録を防ぐ
    th.replaceWith(th.cloneNode(true));
  });
  document.querySelectorAll("#machine-table th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      if (modalSortCol === th.dataset.col) {
        modalSortAsc = !modalSortAsc;
      } else {
        modalSortCol = th.dataset.col;
        // 差枚・G数・確率は降順スタート、台番・機種名は昇順スタート
        modalSortAsc = ["machine_number", "machine_name"].includes(modalSortCol);
      }
      renderMachineTable();
    });
  });
}

// ── タブ切替 ──────────────────────────────────────────────────────────────
function switchModalTab(tab) {
  document.querySelectorAll(".modal-tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tab);
  });
  document.getElementById("tab-all").style.display   = tab === "all"   ? "" : "none";
  document.getElementById("tab-model").style.display = tab === "model" ? "" : "none";

  if (tab === "all") {
    renderMachineTable();
  } else if (tab === "model") {
    modelSortCol = "total_diff";
    modelSortAsc = false;
    renderModelTable();
  }
}

// machineFilter をリセットして全台リストに戻る
function resetMachineFilter() {
  machineFilter = null;
  document.getElementById("tab-btn-all").textContent = "全台リスト";
  document.getElementById("show-all-btn").style.display = "none";
  switchModalTab("all");
}

// ── 機種別サマリタブ ──────────────────────────────────────────────────────
let modelSortCol = "total_diff";
let modelSortAsc = false;

function buildModelSummary(machines) {
  // 機種名でグルーピングして集計
  const groups = {};
  machines.forEach(m => {
    const name = m.machine_name ?? "不明";
    if (!groups[name]) groups[name] = { diffs: [], count: 0 };
    groups[name].diffs.push(m.diff_coins ?? 0);
    groups[name].count++;
  });

  return Object.entries(groups).map(([name, g]) => {
    const total = g.diffs.reduce((s, v) => s + v, 0);
    const avg   = g.count > 0 ? Math.round(total / g.count) : 0;
    const wins  = g.diffs.filter(v => v > 0).length;
    return {
      machine_name: name,
      total_diff:   total,
      avg_diff:     avg,
      win_count:    wins,
      count:        g.count,
      // ソート用キー
      win_rate:     g.count > 0 ? wins / g.count : 0,
    };
  });
}

function renderModelTable(filterName = null) {
  const tbody = document.getElementById("model-table-body");

  if (!currentMachines.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">この日のデータなし</td></tr>';
    return;
  }

  let summary = buildModelSummary(currentMachines);

  // 機種名絞り込み（機種行クリックからの戻り表示には使わないが将来拡張用）
  if (filterName) summary = summary.filter(s => s.machine_name === filterName);

  // ソート
  summary.sort((a, b) => {
    let va = a[modelSortCol];
    let vb = b[modelSortCol];
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    if (typeof va === "string") return modelSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return modelSortAsc ? va - vb : vb - va;
  });

  tbody.innerHTML = summary.map(s => `
    <tr onclick="openModelDetail('${s.machine_name.replace(/'/g, "\\'")}')" title="クリックで台リストを絞り込み">
      <td>${s.machine_name}</td>
      <td class="num ${diffClass(s.total_diff)}">${fmtDiff(s.total_diff)}</td>
      <td class="num ${diffClass(s.avg_diff)}">${fmtDiff(s.avg_diff)}</td>
      <td class="num">${s.win_count}/${s.count}</td>
      <td class="num">${s.count}</td>
    </tr>`).join("");

  // ソートインジケーター更新
  document.querySelectorAll("#model-table th.sortable").forEach(th => {
    th.classList.remove("sort-asc", "sort-desc");
    if (th.dataset.col === modelSortCol) {
      th.classList.add(modelSortAsc ? "sort-asc" : "sort-desc");
    }
  });
}

function initModelTableSort() {
  document.querySelectorAll("#model-table th.sortable").forEach(th => {
    th.replaceWith(th.cloneNode(true));
  });
  document.querySelectorAll("#model-table th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      if (modelSortCol === th.dataset.col) {
        modelSortAsc = !modelSortAsc;
      } else {
        modelSortCol = th.dataset.col;
        modelSortAsc = th.dataset.col === "machine_name";
      }
      renderModelTable();
    });
  });
}

// ── 機種行クリック → 全台リストを機種名で絞り込み ────────────────────────
// 絞り込み中の機種名（null = 絞り込みなし）
let machineFilter = null;

function openModelDetail(machineName) {
  machineFilter = machineName;

  // タブ名を機種名に変更し「全台リストを表示」ボタンを表示
  document.getElementById("tab-btn-all").textContent = machineName;
  document.getElementById("show-all-btn").style.display = "";

  // 全台リストタブに切り替え・差枚降順で表示
  modalSortCol = "diff_coins";
  modalSortAsc = false;
  switchModalTab("all");
}

// ── 日次サマリ ────────────────────────────────────────────────────────────
function renderDaily(summary) {
  const tbody = document.getElementById("daily-body");
  if (!summary.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">データなし</td></tr>';
    return;
  }

  // store_id → store_name を currentData.stores から引く
  const storeMap = {};
  if (currentData && currentData.stores) {
    currentData.stores.forEach(s => {
      s.store_ids.forEach(sid => { storeMap[sid] = s.store_name; });
    });
  }

  tbody.innerHTML = summary.map(d => `
    <tr>
      <td>${d.play_date}</td>
      <td>${storeMap[d.store_id] || d.store_id}</td>
      <td class="num">${d.machine_count.toLocaleString()}</td>
      <td class="num ${diffClass(d.total_diff)}">${fmtDiff(d.total_diff)}</td>
    </tr>`).join("");
}
</script>
